spring:
  application:
    name: REST
  datasource:
    url: jdbc:h2:mem:tasks;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  h2:
    console:
      enabled: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

logging:
  level:
    org.springframework.jdbc.core: INFO
